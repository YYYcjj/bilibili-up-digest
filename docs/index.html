// ── B站 WBI 签名 ──
var MIXIN_KEY_ENC_TAB=[46,47,18,2,53,8,23,32,15,50,10,31,58,3,45,35,27,43,5,49,33,9,42,19,29,28,14,39,12,38,41,13,37,48,7,16,24,55,40,61,26,17,0,1,60,51,30,4,22,25,54,21,56,59,6,63,57,62,11,36,20,52,44,34];
var _wbiKey='';
async function getWbiKey(){
  if(_wbiKey)return _wbiKey;
  var r=await fetch(P('https://api.bilibili.com/x/web-interface/nav'));
  var d=await r.json();
  var w=d.data.wbi_img;
  var ik=w.img_url.match(/wbi\/(.*?)\./)[1];
  var sk=w.sub_url.match(/wbi\/(.*?)\./)[1];
  _wbiKey=MIXIN_KEY_ENC_TAB.map(function(i){return(ik+sk)[i]}).join('').slice(0,32);
  return _wbiKey;
}
async function biliGet(path,params){
  if(!params)params={};
  var mk=await getWbiKey();
  params.wts=Math.floor(Date.now()/1000);
  var keys=Object.keys(params).sort(),q='';
  for(var i=0;i<keys.length;i++){if(i)q+='&';q+=keys[i]+'='+params[keys[i]]}
  params.w_rid=md5(q+mk);
  var u='https://api.bilibili.com'+path+'?'+q+'&w_rid='+params.w_rid+'&wts='+params.wts;
  return fetch(P(u)).then(function(r){return r.json()});
}
function fixPic(u){
  if(!u)return u;u=u.trim();
  if(u.startsWith('//'))return'https:'+u;
  if(u.startsWith('http://'))return u.replace('http://','https://');
  return u;
}

// ── DeepSeek AI ──
var LLM_KEY='sk-f1949eb1aa6b47648825efb59f668fc3';
var LLM_BASE='https://api.deepseek.com/v1';
var LLM_MODEL='deepseek-chat';

async function aiSummarize(vid){
  var prompt="请分析这个B站视频，输出JSON（不要markdown包裹）：\n标题："+vid.title+"\n简介："+(vid.desc||'').slice(0,500)+"\n分类："+(vid.tname||'')+"\n\n{";
  prompt+='"topic":"一句话主题（15字）","sections":[';
  prompt+='{"part":"第一部分","content":"内容（20-40字）"},';
  prompt+='{"part":"第二部分","content":"内容（20-40字）"},';
  prompt+='{"part":"第三部分","content":"内容（20-40字）"}],';
  prompt+='"key_points":["观点1","观点2","观点3"],';
  prompt+='"category":"分类","recommendation":"推荐/可选/可跳过",';
  prompt+='"recommendation_reason":"理由（15字）",';
  prompt+='"scores":{"content_quality":8,"info_density":8,"entertainment":8,"tech_depth":7,"overall":8}}';
  var r=await fetch(LLM_BASE+'/chat/completions',{
    method:'POST',headers:{'Authorization':'Bearer '+LLM_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({model:LLM_MODEL,messages:[{role:'user',content:prompt}],temperature:0.3,max_tokens:500})
  });
  var d=await r.json();var t=d.choices[0].message.content.trim();
  if(t.indexOf('```json')>=0)t=t.split('```json')[1].split('```')[0];
  else if(t.indexOf('```')>=0)t=t.split('```')[1].split('```')[0];
  return JSON.parse(t);
}

async function aiSubtitle(vidData){
  var tags=(vidData.tags||[]).map(function(t){return t.tag_name}).slice(0,10).join(', ');
  var min=Math.floor((vidData.duration||0)/60);
  var prompt="这个B站视频没有字幕。请根据标题和简介生成详细文字版：\n标题："+vidData.title+"\n简介："+(vidData.desc||'').slice(0,600)+"\n时长：约"+min+"分钟\n标签："+tags+"\n\n请生成口语化文字稿，300-500字。";
  var r=await fetch(LLM_BASE+'/chat/completions',{
    method:'POST',headers:{'Authorization':'Bearer '+LLM_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({model:LLM_MODEL,messages:[{role:'user',content:prompt}],temperature:0.6,max_tokens:1000})
  });
  var d=await r.json();
  if(!d.choices||!d.choices[0])return{text:'AI服务异常，请稍后重试',ai_generated:false};
  var t=d.choices[0].message.content.trim();
  if(t.length<30)return{text:'AI生成内容过短，请重试',ai_generated:false};
  return{text:t,ai_generated:true};
}

function fmt(n){if(n>=1e4)return(n/1e4).toFixed(1)+'万';return n.toLocaleString()}
function ts(d){return new Date(d*1000).toLocaleDateString('zh-CN')}
function htmlEscape(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── API ──
async function searchUP(name){
  return biliGet('/x/web-interface/search/type',{search_type:'bili_user',keyword:name}).then(function(d){
    return(d.data.result||[]).map(function(u){return{mid:u.mid,uname:u.uname,sign:u.usign||'',fans:u.fans||0,videos:u.videos||0,face:fixPic(u.upic||'')}});
  });
}
async function getVideos(mid,page,ps){
  ps=ps||50;page=page||1;
  return biliGet('/x/space/wbi/arc/search',{mid:mid,ps:ps,pn:page,order:'pubdate'}).then(function(d){
    var vs=(d.data.list.vlist||[]).map(function(v){return{bvid:v.bvid,title:v.title,description:v.description||'',length:v.length,created:v.created,play:v.play||0,comment:v.comment||0,pic:fixPic(v.pic||'')}});
    var total=d.data.page.count||0;
    return{videos:vs,total:total,page:page,ps:ps,has_more:page*ps<total};
  });
}
async function getSubtitle(bvid){
  var info=await biliGet('/x/web-interface/view',{bvid:bvid});
  var cid=info.data.cid;
  var player=await biliGet('/x/player/v2',{bvid:bvid,cid:cid});
  var subs=player.data.subtitle&&player.data.subtitle.subtitles||[];
  if(subs.length&&subs[0].subtitle_url){
    var subUrl=fixPic(subs[0].subtitle_url);
    var sr=await fetch(P(subUrl));var sd=await sr.json();
    var body=sd.body||[];
    var text=body.slice(0,1000).map(function(item,i){return(i+1)+'. '+item.content}).join('\n');
    if(body.length>1000)text+='\n\n...（共'+body.length+'句，已显示前1000句）';
    return{subtitles:[{lan:subs[0].lan||'',lan_doc:subs[0].lan_doc||''}],text:text,ai_generated:false,total_lines:body.length};
  }
  return aiSubtitle(info.data);
}

// ── 页面逻辑 ──
var _curMid=null,_curPage=1,_totalVids=0,_curUname='',_curFace='';

function goHome(){
  history.pushState({page:'home'},'',location.pathname);
  document.getElementById('detailPage').classList.remove('show');
  document.getElementById('videoPage').classList.remove('show');
}

function openUP(mid,uname,face,sign){
  history.pushState({page:'up',mid:mid,uname:uname,face:face,sign:sign},'',location.pathname+'?up='+mid);
  _curMid=mid;_curPage=1;_curUname=uname;_curFace=face;
  document.getElementById('videoPage').classList.remove('show');
  document.getElementById('detailPage').classList.add('show');
  document.getElementById('dpName').textContent=uname;
  document.getElementById('dpMeta').textContent=(sign||'').slice(0,40);
  document.getElementById('dpVideos').innerHTML='<div class="loading"><div class="spinner"></div><p>加载视频...</p></div>';
  loadVideos(mid,1);
}

async function loadVideos(mid,page,append){
  try{
    var d=await getVideos(mid,page,50);
    _curPage=page;_totalVids=d.total;
    var h='';
    if(!append){
      h='<div class="back-btn" onclick="goHome()">返回</div>';
      h+='<div class="result-stats" id="vstats">共 '+d.total+' 个视频</div>';
      h+='<div class="filter-bar"><span class="fl">排序：</span><select onchange="sortVideos(this.value)"><option value="newest">最新发布</option><option value="hot">最多播放</option><option value="comment">最多评论</option></select></div>';
      h+='<div id="videoList"></div>';
    }
    document.getElementById('dpVideos').innerHTML=h;
    var cards='';d.videos.forEach(function(v){cards+=cardHTML(v)});
    if(append)document.getElementById('videoList').innerHTML+=cards;
    else document.getElementById('videoList').innerHTML=cards;
    if(d.has_more)document.getElementById('dpVideos').innerHTML+='<div style="text-align:center;padding:12px"><button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">加载更多</button></div>';
  }catch(e){document.getElementById('dpVideos').innerHTML='<div class="error">加载失败: '+e.message+'</div>'}
}

function loadMore(){
  var btn=document.getElementById('loadMoreBtn');btn.textContent='加载中...';btn.disabled=true;
  getVideos(_curMid,_curPage+1,50).then(function(d){
    btn.remove();_curPage++;
    var cards='';d.videos.forEach(function(v){cards+=cardHTML(v)});
    document.getElementById('videoList').innerHTML+=cards;
    if(d.has_more)document.getElementById('dpVideos').innerHTML+='<div style="text-align:center;padding:12px"><button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">加载更多</button></div>';
    else document.getElementById('vstats').textContent='共 '+_totalVids+' 个视频（已全部加载）';
  }).catch(function(){btn.textContent='加载失败，点击重试';btn.disabled=false});
}

function sortVideos(order){
  var list=document.getElementById('videoList'),cards=Array.from(list.children);
  if(order==='hot')cards.sort(function(a,b){return(b.dataset.play||0)-(a.dataset.play||0)});
  else if(order==='comment')cards.sort(function(a,b){return(b.dataset.comment||0)-(a.dataset.comment||0)});
  else cards.sort(function(a,b){return(b.dataset.created||0)-(a.dataset.created||0)});
  cards.forEach(function(c){list.appendChild(c)});
}

function cardHTML(v){
  return'<div class="card" data-play="'+v.play+'" data-comment="'+v.comment+'" data-created="'+v.created+'"><div class="top" onclick="openVideo(\''+v.bvid+'\',\''+v.title.replace(/'/g,'')+'\')"><div class="thumb"><img src="'+v.pic+'" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'"><span class="dur">'+v.length+'</span></div><div class="info"><div class="title">'+v.title+'</div><div class="meta"><span>'+ts(v.created)+'</span><span>'+fmt(v.play)+'播放</span><span>'+fmt(v.comment)+'评论</span></div><div class="desc">'+(v.description||'')+'</div></div></div></div>';
}

function openVideo(bvid,title){
  history.pushState({page:'video',bvid:bvid,title:title},'',location.pathname+'?bvid='+bvid+'&title='+encodeURIComponent(title));
  document.getElementById('detailPage').classList.remove('show');
  document.getElementById('videoPage').classList.add('show');
  document.getElementById('vpTitle').textContent=title;
  document.getElementById('vpSummaryLoading').style.display='block';
  document.getElementById('vpSummaryContent').innerHTML='';
  document.getElementById('vpSubtitleLoading').style.display='block';
  document.getElementById('vpSubtitleContent').innerHTML='';
  document.getElementById('vpSubtitleTitle').innerHTML='视频文字版';
  loadSummary(bvid);
  loadSub(bvid);
}

function closeVideoPage(){
  document.getElementById('videoPage').classList.remove('show');
  document.getElementById('detailPage').classList.add('show');
  var up=location.search.match(/up=(\d+)/);
  if(up)history.pushState({page:'up',mid:up[1]},'',location.pathname+'?up='+up[1]);
}

async function loadSummary(bvid){
  try{
    var info=await biliGet('/x/web-interface/view',{bvid:bvid});
    var vid=info.data;
    var vidData={title:vid.title,desc:vid.desc||'',tname:vid.tname||'',
      duration:vid.duration,tags:(vid.tags||[]).map(function(t){return t.tag_name}).slice(0,10)};
    var d=await aiSummarize(vidData);
    document.getElementById('vpSummaryLoading').style.display='none';
    var h='';
    if(d.topic)h+='<span class="topic">'+d.topic+'</span>';
    if(d.scores&&d.scores.overall>0){
      h+='<div class="score-row">';
      h+='<div class="score-item"><span>内容质量</span><span class="sv">'+d.scores.content_quality+'</span></div>';
      h+='<div class="score-item"><span>信息密度</span><span class="sv">'+d.scores.info_density+'</span></div>';
      h+='<div class="score-item"><span>娱乐性</span><span class="sv">'+d.scores.entertainment+'</span></div>';
      h+='<div class="score-item"><span>技术深度</span><span class="sv">'+d.scores.tech_depth+'</span></div>';
      h+='<div class="score-item overall"><span>综合分</span><span class="sv">'+d.scores.overall+'</span></div>';
      h+='</div>';
    }
    if(d.sections&&d.sections.length){h+='<div class="sections"><span class="label">内容结构</span>';d.sections.forEach(function(s){h+='<div class="sec-item"><div class="part">'+s.part+'</div><div class="content">'+s.content+'</div></div>'});h+='</div>'}
    if(d.key_points&&d.key_points.length){h+='<div class="keypoints"><span class="label">核心观点</span>';d.key_points.forEach(function(k){h+='<div class="kp">'+k+'</div>'});h+='</div>'}
    if(d.category||d.recommendation){h+='<div class="tags-row">';if(d.category)h+='<span class="tag cat">'+d.category+'</span>';if(d.recommendation)h+='<span class="tag rec">'+d.recommendation+'</span>';if(d.recommendation_reason)h+='<span class="tag reason">'+d.recommendation_reason+'</span>';h+='</div>'}
    document.getElementById('vpSummaryContent').innerHTML=h||'<div class="sec-error">暂无概括数据</div>';
  }catch(e){document.getElementById('vpSummaryLoading').style.display='none';document.getElementById('vpSummaryContent').innerHTML='<div class="sec-error">AI概括失败: '+e.message+'</div>'}
}

var _subPoll=null;
async function loadSub(bvid){
  if(_subPoll)clearInterval(_subPoll);
  try{
    var d=await getSubtitle(bvid);
    if(d._pending){
      document.getElementById('vpSubtitleTitle').innerHTML='AI生成文字版 <span class="ai-badge">生成中...</span>';
      document.getElementById('vpSubtitleLoading').style.display='none';
      document.getElementById('vpSubtitleContent').innerHTML='<div class="sec-loading"><div class="spinner"></div><p>DeepSeek AI 正在生成...</p></div>';
      var c=0;_subPoll=setInterval(async function(){c++;
        try{var r2=await fetch(P('https://api.bilibili.com/x/player/v2?bvid='+bvid+'&cid='+d._cid));
          var sd=await r2.json();renderSubInline(sd);
        }catch(e){if(c>20){clearInterval(_subPoll);document.getElementById('vpSubtitleContent').innerHTML='<div class="sec-error">生成超时</div>'}}
      },3000);
      return;
    }
    renderSub(d);
  }catch(e){document.getElementById('vpSubtitleLoading').style.display='none';document.getElementById('vpSubtitleContent').innerHTML='<div class="sec-error">获取失败: '+e.message+'</div>'}
}

function renderSub(d){
  document.getElementById('vpSubtitleLoading').style.display='none';
  if(d.ai_generated)document.getElementById('vpSubtitleTitle').innerHTML='AI生成文字版 <span class="ai-badge">AI推测</span>';
  else if(d.subtitles&&d.subtitles.length){var tl=d.total_lines||0;document.getElementById('vpSubtitleTitle').innerHTML='CC字幕 ('+d.subtitles[0].lan_doc+')'+(tl>1000?' 共'+tl+'句':'')}
  if(d.text&&d.text.length>20)document.getElementById('vpSubtitleContent').innerHTML='<div class="subtitle-text">'+htmlEscape(d.text)+'</div>';
  else document.getElementById('vpSubtitleContent').innerHTML='<div class="sec-error" style="padding:20px">'+(d.text||'暂无可用的文字版内容')+'</div>';
}

function renderSubInline(d){clearInterval(_subPoll);renderSub(d)}

async function search(){
  var name=document.getElementById('searchInput').value.trim();if(!name)return;
  document.getElementById('list').innerHTML='<div class="loading"><div class="spinner"></div><p>搜索中...</p></div>';
  try{var results=await searchUP(name);
  if(!results.length){document.getElementById('list').innerHTML='<div class="error">未找到UP主</div>';return}
  var up=results[0];openUP(up.mid,up.uname,up.face,up.sign);
  }catch(e){document.getElementById('list').innerHTML='<div class="error">搜索失败: '+e.message+'</div>'}
}

window.onpopstate=function(e){
  if(e.state&&e.state.page==='video')showVideoFromState(e.state);
  else if(e.state&&e.state.page==='up')openUP(e.state.mid,e.state.uname,e.state.face,e.state.sign);
  else goHome();
};

function showVideoFromState(s){openVideo(s.bvid,s.title)}

(function init(){
  var params=new URLSearchParams(location.search);
  var bvid=params.get('bvid');
  if(bvid){history.replaceState({page:'video',bvid:bvid,title:params.get('title')||''},'',location.pathname+'?bvid='+bvid);openVideo(bvid,params.get('title')||'');return}
  var upMid=params.get('up');
  if(upMid){history.replaceState({page:'home'},'',location.pathname);document.getElementById('searchInput').value=upMid;search();return}
})();
</script>
