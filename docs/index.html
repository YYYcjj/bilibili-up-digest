<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>B站UP主视频速览</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#fb7299,#fc8f6e);color:#fff;padding:24px 16px 20px;position:sticky;top:0;z-index:100}
.header h1{font-size:22px;text-align:center}
.header .sub{font-size:13px;opacity:.85;text-align:center;margin:6px 0 0}
.login-bar{display:flex;justify-content:center;align-items:center;gap:8px;padding:12px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:82px;z-index:99}
.login-bar .avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;vertical-align:middle}
.login-bar .uname{font-size:14px;font-weight:500}
.login-bar button{border:1px solid #fb7299;background:#fff;color:#fb7299;padding:6px 16px;border-radius:16px;font-size:13px;cursor:pointer}
.login-bar button.logout{color:#999;border-color:#ddd}
.search-box{display:flex;gap:8px;padding:12px;background:#fff}
.search-box input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:20px;font-size:15px;outline:none}
.search-box input:focus{border-color:#fb7299}
.search-box button{background:#fb7299;border:none;color:#fff;padding:10px 20px;border-radius:20px;font-size:15px;cursor:pointer}
.follow-section{display:none;padding:12px}
.follow-section h3{font-size:14px;color:#666;margin-bottom:8px;padding:0 4px}
.follow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.follow-card{background:#fff;border-radius:10px;padding:10px;text-align:center;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .1s}
.follow-card:active{transform:scale(.96)}
.follow-card img{width:40px;height:40px;border-radius:50%;object-fit:cover;margin-bottom:6px}
.follow-card .uname{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.content{padding:0 12px}
.card{background:#fff;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card .top{display:flex;cursor:pointer;transition:background .15s}
.card .top:active{background:#fafafa}
.card .thumb{width:120px;min-width:120px;height:75px;background:#eee;position:relative;overflow:hidden}
.card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.card .dur{position:absolute;right:4px;bottom:4px;background:rgba(0,0,0,.75);color:#fff;font-size:10px;padding:2px 5px;border-radius:3px}
.card .info{flex:1;padding:10px 12px;min-width:0}
.card .title{font-size:14px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.card .meta{font-size:11px;color:#999;margin-bottom:4px;display:flex;gap:10px;flex-wrap:wrap}
.card .meta span{white-space:nowrap}
.card .desc{font-size:12px;color:#666;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-stats{text-align:center;font-size:12px;color:#999;padding:4px 0 8px}
.loading{padding:60px;text-align:center;color:#999}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid #eee;border-top-color:#fb7299;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:40px 20px;text-align:center;color:#e74c3c;font-size:14px}
.error small{color:#999;font-size:12px;display:block;margin-top:8px}
.detail-page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f5f5;z-index:150;overflow-y:auto}
.detail-page.show{display:block}
.detail-page .dp-header{background:linear-gradient(135deg,#fb7299,#fc8f6e);color:#fff;padding:16px;display:flex;align-items:center;gap:12px}
.detail-page .dp-header .back{font-size:24px;cursor:pointer;width:32px;text-align:center}
.detail-page .dp-header .up-name{font-size:17px;font-weight:600}
.detail-page .dp-header .up-meta{font-size:12px;opacity:.85}
.detail-page .dp-videos{padding:12px;padding-bottom:80px}
.back-btn{display:inline-flex;align-items:center;gap:4px;color:#fb7299;font-size:13px;cursor:pointer;padding:8px 0;margin-bottom:4px}
.filter-bar{display:flex;align-items:center;gap:6px;padding:8px 0;font-size:12px}
.filter-bar select{padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.filter-bar .fl{color:#999}
.load-more-btn{background:#fb7299;border:none;color:#fff;padding:8px 32px;border-radius:20px;font-size:14px;cursor:pointer;margin:0 auto;display:block}
.load-more-btn:disabled{opacity:.5}
.video-page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f5f5;z-index:160;overflow-y:auto}
.video-page.show{display:block}
.video-page .vp-header{background:linear-gradient(135deg,#fb7299,#fc8f6e);color:#fff;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;z-index:10}
.video-page .vp-header .back{font-size:22px;cursor:pointer;min-width:28px;text-align:center;line-height:1.3}
.video-page .vp-header .vp-title{font-size:15px;font-weight:600;line-height:1.4;flex:1}
.video-page .vp-body{padding:16px}
.video-page .vp-section{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.video-page .vp-section .sec-title{font-size:15px;font-weight:600;color:#fb7299;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.video-page .vp-section .ai-badge{font-size:11px;background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:10px;font-weight:400}
.video-page .vp-section .sec-loading{font-size:13px;color:#999;text-align:center;padding:20px}
.video-page .vp-section .sec-error{font-size:13px;color:#e74c3c;text-align:center;padding:16px}
.video-page .topic{font-size:17px;font-weight:600;color:#333;margin-bottom:12px;display:block}
.video-page .sections{margin-bottom:12px}
.video-page .sections>.label{font-weight:500;color:#fb7299;margin-bottom:6px;display:block;font-size:13px}
.video-page .sec-item{background:#f8f9fa;border-radius:8px;padding:10px;margin-bottom:6px}
.video-page .sec-item .part{color:#1976d2;font-weight:500;margin-bottom:4px;font-size:13px}
.video-page .sec-item .content{color:#666;font-size:13px;line-height:1.5}
.video-page .keypoints{margin-bottom:12px}
.video-page .keypoints>.label{font-weight:500;color:#e65100;margin-bottom:4px;display:block;font-size:13px}
.video-page .kp{font-size:13px;padding:3px 0;color:#555}

.video-page .tag.cat{background:#e3f2fd;color:#1976d2}
.video-page .tag.rec{background:#fff3e0;color:#e65100;font-weight:500}
.video-page .tag.reason{color:#999}
.video-page .subtitle-text{background:#fafafa;border-radius:8px;padding:12px;font-size:13px;color:#555;line-height:1.8;white-space:pre-wrap}
.score-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}

.modal-box .close-btn{margin-top:16px;padding:8px 24px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;font-size:14px;cursor:pointer}

var LK='sk-f1949eb1aa6b47648825efb59f668fc3',LB='https://api.deepseek.com/v1',LM='deepseek-chat';
async function aiSummary(vid){
  var p="请分析这个B站视频，输出JSON（不要markdown包裹）：\n标题："+vid.title+"\n简介："+(vid.desc||'').slice(0,500)+"\n分类："+(vid.tname||'')+"\n{";
  p+='"topic":"一句话主题（15字）","sections":[';
  p+='{"part":"第一部分","content":"内容（20-40字）"},';
  p+='{"part":"第二部分","content":"内容（20-40字）"},';
  p+='{"part":"第三部分","content":"内容（20-40字）"}],';
  p+='"key_points":["观点1","观点2","观点3"],';
  p+='"category":"分类","recommendation":"推荐/可选/可跳过",';
  p+='"recommendation_reason":"理由（15字）",';
  p+='"scores":{"content_quality":8,"info_density":8,"entertainment":8,"tech_depth":7,"overall":8}}';
  var r=await fetch(LB+'/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+LK,'Content-Type':'application/json'},body:JSON.stringify({model:LM,messages:[{role:'user',content:p}],temperature:0.3,max_tokens:500})});
  var d=await r.json();var t=d.choices[0].message.content.trim();
  if(t.indexOf('```json')>=0)t=t.split('```json')[1].split('```')[0];else if(t.indexOf('```')>=0)t=t.split('```')[1].split('```')[0];
  return JSON.parse(t);
}
async function aiSubtitle(vd){
  var tags=(vd.tags||[]).map(function(t){return t.tag_name}).slice(0,10).join(', ');
  var min=Math.floor((vd.duration||0)/60);
  var p="这个B站视频没有字幕。请根据标题和简介生成详细文字版：\n标题："+vd.title+"\n简介："+(vd.desc||'').slice(0,600)+"\n时长：约"+min+"分钟\n标签："+tags+"\n\n请生成口语化文字稿，300-500字。";
  var r=await fetch(LB+'/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+LK,'Content-Type':'application/json'},body:JSON.stringify({model:LM,messages:[{role:'user',content:p}],temperature:0.6,max_tokens:1000})});
  var d=await r.json();
  if(!d.choices||!d.choices[0])return{text:'AI服务异常',ai_generated:false};
  var t=d.choices[0].message.content.trim();
  return t.length<30?{text:'AI内容过短',ai_generated:false}:{text:t,ai_generated:true};
}

// ── 字幕 ──
async function getSub(bvid){
  var r=await Pfetch('https://api.bilibili.com/x/web-interface/view?bvid='+bvid);var info=await r.json();
  var cid=info.data.cid;
  r=await Pfetch('https://api.bilibili.com/x/player/v2?bvid='+bvid+'&cid='+cid);var pl=await r.json();
  var subs=(pl.data.subtitle||pl.data.subtitle||{}).subtitles||[];
  if(subs.length&&subs[0].subtitle_url){
    var u=fixPic(subs[0].subtitle_url);r=await Pfetch(u);var sd=await r.json();
    var body=sd.body||[];
    var t=body.slice(0,1000).map(function(item,i){return(i+1)+'. '+item.content}).join('\n');
    if(body.length>1000)t+='\n\n...（共'+body.length+'句，已显示前1000句）';
    return{subtitles:[{lan:subs[0].lan||'',lan_doc:subs[0].lan_doc||''}],text:t,ai_generated:false,total_lines:body.length};
  }
  return aiSubtitle(info.data);
}

// ── 工具 ──
function fmt(n){if(n>=1e4)return(n/1e4).toFixed(1)+'万';return n.toLocaleString()}
function ts(d){return new Date(d*1000).toLocaleDateString('zh-CN')}
function hE(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── 登录 ──
var _loginUid=null,_loginInfo=null,_pollTimer=null;
function showLogin(){
  document.getElementById('loginModal').classList.add('show');
  document.getElementById('qrStatus').textContent='生成中...';document.getElementById('qrWrap').innerHTML='';
  Pfetch('https://passport.bilibili.com/x/passport-login/web/qrcode/generate').then(function(r){return r.json()}).then(function(d){
    new QRCode(document.getElementById('qrWrap'),{text:d.data.url,width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    document.getElementById('qrStatus').textContent='请用B站APP扫码';
    _pollTimer=setInterval(function(){pollLogin(d.data.qrcode_key)},2000);
  }).catch(function(e){document.getElementById('qrStatus').textContent='生成失败: '+e.message});
}
function pollLogin(key){
  Pfetch('https://passport.bilibili.com/x/passport-login/web/qrcode/poll?qrcode_key='+key).then(function(r){return r.json()}).then(function(d){
    var c=d.data.code||-1;
    if(c===0){clearInterval(_pollTimer);_pollTimer=null;closeLogin();
      Pfetch('https://api.bilibili.com/x/web-interface/nav').then(function(r){return r.json()}).then(function(n){
        if(n.data&&n.data.isLogin){_loginUid=n.data.mid;_loginInfo={uid:n.data.mid,uname:n.data.uname,face:fixPic(n.data.face||'')};
        localStorage.setItem('_login_info',JSON.stringify(_loginInfo));
        updateLoginUI();loadFollows();}
      });
    }else if(c===86038){document.getElementById('qrStatus').textContent='二维码已过期';clearInterval(_pollTimer);_pollTimer=null}else if(c===86090)document.getElementById('qrStatus').textContent='已扫码，请确认';else if(c===86101)document.getElementById('qrStatus').textContent='等待扫码...';
  });
}
function closeLogin(){document.getElementById('loginModal').classList.remove('show');if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null}}
function logout(){_loginUid=null;_loginInfo=null;_cookies='';saveCookies();_wk='';localStorage.removeItem('_login_info');updateLoginUI();document.getElementById('followSection').style.display='none'}
function updateLoginUI(){
  if(_loginInfo){document.getElementById('loginBar').innerHTML='<img src="'+_loginInfo.face+'" class="avatar" referrerpolicy="no-referrer"> <span class="uname">'+_loginInfo.uname+'</span> <button class="logout" onclick="logout()">退出</button>'}else{document.getElementById('loginBar').innerHTML='<span id="loginStatus" style="font-size:13px;color:#999">未登录</span> <button onclick="showLogin()">扫码登录</button>'}
}
function loadFollows(){
  getFollowings().then(function(users){if(users.length){document.getElementById('followSection').style.display='block';var h='';users.forEach(function(u){h+='<div class="follow-card" onclick="openUP('+u.mid+',\''+u.uname+'\',\''+u.face+'\',\''+(u.sign||'').replace(/'/g,'')+'\')"><img src="'+u.face+'" referrerpolicy="no-referrer"><div class="uname">'+u.uname+'</div></div>'});document.getElementById('followList').innerHTML=h}});
}

// ── 页面逻辑 ──
var _mid=null,_pg=1,_totalV=0,_un='',_fc='';
function goHome(){history.pushState({page:'home'},'',location.pathname);document.getElementById('detailPage').classList.remove('show');document.getElementById('videoPage').classList.remove('show')}
function openUP(mid,un,fc,sn){history.pushState({page:'up',mid:mid,un:un,fc:fc,sn:sn},'',location.pathname+'?up='+mid);_mid=mid;_pg=1;_un=un;_fc=fc;document.getElementById('videoPage').classList.remove('show');document.getElementById('detailPage').classList.add('show');document.getElementById('dpName').textContent=un;document.getElementById('dpMeta').textContent=(sn||'').slice(0,40);document.getElementById('dpVideos').innerHTML='<div class="loading"><div class="spinner"></div><p>加载视频...</p></div>';loadVP(mid,1)}
async function loadVP(mid,pg,app){try{var d=await getVideos(mid,pg,50);_pg=pg;_totalV=d.total;var h='';if(!app){h='<div class="back-btn" onclick="goHome()">返回</div>';h+='<div class="result-stats" id="vstats">共 '+d.total+' 个视频</div>';h+='<div class="filter-bar"><span class="fl">排序：</span><select onchange="sortV(this.value)"><option value="newest">最新</option><option value="hot">最多播放</option><option value="comment">最多评论</option></select></div>';h+='<div id="videoList"></div>'}document.getElementById('dpVideos').innerHTML=h;var c='';d.videos.forEach(function(v){c+=cHTML(v)});if(app)document.getElementById('videoList').innerHTML+=c;else document.getElementById('videoList').innerHTML=c;if(d.has_more)document.getElementById('dpVideos').innerHTML+='<div style="text-align:center;padding:12px"><button class="load-more-btn" id="ldBtn" onclick="ldMore()">加载更多</button></div>'}catch(e){document.getElementById('dpVideos').innerHTML='<div class="error">加载失败: '+e.message+'</div>'}}
function ldMore(){var b=document.getElementById('ldBtn');b.textContent='加载中...';b.disabled=true;getVideos(_mid,_pg+1,50).then(function(d){b.remove();_pg++;var c='';d.videos.forEach(function(v){c+=cHTML(v)});document.getElementById('videoList').innerHTML+=c;if(d.has_more)document.getElementById('dpVideos').innerHTML+='<div style="text-align:center;padding:12px"><button class="load-more-btn" id="ldBtn" onclick="ldMore()">加载更多</button></div>';else document.getElementById('vstats').textContent='共 '+_totalV+' 个视频（已全部加载）'}).catch(function(){b.textContent='加载失败，点击重试';b.disabled=false})}
function sortV(o){var l=document.getElementById('videoList'),cs=Array.from(l.children);if(o==='hot')cs.sort(function(a,b){return(b.dataset.play||0)-(a.dataset.play||0)});else if(o==='comment')cs.sort(function(a,b){return(b.dataset.comment||0)-(a.dataset.comment||0)});else cs.sort(function(a,b){return(b.dataset.created||0)-(a.dataset.created||0)});cs.forEach(function(c){l.appendChild(c)})}
function cHTML(v){return'<div class="card" data-play="'+v.play+'" data-comment="'+v.comment+'" data-created="'+v.created+'"><div class="top" onclick="openV(\''+v.bvid+'\',\''+v.title.replace(/'/g,'')+'\')"><div class="thumb"><img src="'+v.pic+'" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'"><span class="dur">'+v.length+'</span></div><div class="info"><div class="title">'+v.title+'</div><div class="meta"><span>'+ts(v.created)+'</span><span>'+fmt(v.play)+'播放</span><span>'+fmt(v.comment)+'评论</span></div><div class="desc">'+(v.description||'')+'</div></div></div></div>'}
function openV(bvid,tl){history.pushState({page:'video',bvid:bvid,title:tl},'',location.pathname+'?bvid='+bvid+'&title='+encodeURIComponent(tl));document.getElementById('detailPage').classList.remove('show');document.getElementById('videoPage').classList.add('show');document.getElementById('vpTitle').textContent=tl;document.getElementById('vpSummaryLoading').style.display='block';document.getElementById('vpSummaryContent').innerHTML='';document.getElementById('vpSubtitleLoading').style.display='block';document.getElementById('vpSubtitleContent').innerHTML='';document.getElementById('vpSubtitleTitle').innerHTML='视频文字版';loadSum(bvid);loadSub(bvid)}
function closeVP(){document.getElementById('videoPage').classList.remove('show');document.getElementById('detailPage').classList.add('show')}
async function loadSum(bvid){try{var r=await Pfetch('https://api.bilibili.com/x/web-interface/view?bvid='+bvid);var inf=await r.json();var vd=inf.data;var vdd={title:vd.title,desc:vd.desc||'',tname:vd.tname||'',tags:(vd.tags||[]).map(function(t){return t.tag_name}).slice(0,10)};var d=await aiSummary(vdd);document.getElementById('vpSummaryLoading').style.display='none';var h='';if(d.topic)h+='<span class="topic">'+d.topic+'</span>';if(d.scores&&d.scores.overall>0){h+='<div class="score-row">';h+='<div class="score-item"><span>内容质量</span><span class="sv">'+d.scores.content_quality+'</span></div>';h+='<div class="score-item"><span>信息密度</span><span class="sv">'+d.scores.info_density+'</span></div>';h+='<div class="score-item"><span>娱乐性</span><span class="sv">'+d.scores.entertainment+'</span></div>';h+='<div class="score-item"><span>技术深度</span><span class="sv">'+d.scores.tech_depth+'</span></div>';h+='<div class="score-item overall"><span>综合分</span><span class="sv">'+d.scores.overall+'</span></div>';h+='</div>'}if(d.sections&&d.sections.length){h+='<div class="sections"><span class="label">内容结构</span>';d.sections.forEach(function(s){h+='<div class="sec-item"><div class="part">'+s.part+'</div><div class="content">'+s.content+'</div></div>'});h+='</div>'}if(d.key_points&&d.key_points.length){h+='<div class="keypoints"><span class="label">核心观点</span>';d.key_points.forEach(function(k){h+='<div class="kp">'+k+'</div>'});h+='</div>'}if(d.category||d.recommendation){h+='<div class="tags-row">';if(d.category)h+='<span class="tag cat">'+d.category+'</span>';if(d.recommendation)h+='<span class="tag rec">'+d.recommendation+'</span>';if(d.recommendation_reason)h+='<span class="tag reason">'+d.recommendation_reason+'</span>';h+='</div>'}document.getElementById('vpSummaryContent').innerHTML=h||'<div class="sec-error">暂无概括数据</div>'}catch(e){document.getElementById('vpSummaryLoading').style.display='none';document.getElementById('vpSummaryContent').innerHTML='<div class="sec-error">AI概括失败: '+e.message+'</div>'}}
async function loadSub(bvid){try{var d=await getSub(bvid);document.getElementById('vpSubtitleLoading').style.display='none';if(d.ai_generated)document.getElementById('vpSubtitleTitle').innerHTML='AI生成文字版 <span class="ai-badge">AI推测</span>';else if(d.subtitles&&d.subtitles.length){var tl=d.total_lines||0;document.getElementById('vpSubtitleTitle').innerHTML='CC字幕 ('+d.subtitles[0].lan_doc+')'+(tl>1000?' 共'+tl+'句':'')}if(d.text&&d.text.length>20)document.getElementById('vpSubtitleContent').innerHTML='<div class="subtitle-text">'+hE(d.text)+'</div>';else document.getElementById('vpSubtitleContent').innerHTML='<div class="sec-error" style="padding:20px">'+(d.text||'暂无可用的文字版内容')+'</div>'}catch(e){document.getElementById('vpSubtitleLoading').style.display='none';document.getElementById('vpSubtitleContent').innerHTML='<div class="sec-error">获取失败: '+e.message+'</div>'}}
async function search(){var n=document.getElementById('searchInput').value.trim();if(!n)return;document.getElementById('list').innerHTML='<div class="loading"><div class="spinner"></div><p>搜索中...</p></div>';try{var r=await searchUP(n);if(!r.length){document.getElementById('list').innerHTML='<div class="error">未找到UP主</div>';return}var u=r[0];openUP(u.mid,u.uname,u.face,u.sign)}catch(e){document.getElementById('list').innerHTML='<div class="error">搜索失败: '+e.message+'</div>'}}
window.onpopstate=function(e){if(e.state&&e.state.page==='video')openV(e.state.bvid,e.state.title);else if(e.state&&e.state.page==='up')openUP(e.state.mid,e.state.un,e.state.fc,e.state.sn);else goHome()};
// ── 初始化 ──
(function(){try{var ls=localStorage.getItem('_login_info');if(ls){_loginInfo=JSON.parse(ls);_loginUid=_loginInfo.uid;updateLoginUI();loadFollows()}}catch(e){}}());</script>
